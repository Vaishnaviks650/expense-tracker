<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:450px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    color:#333;
    margin-bottom:20px;
}

.input-group{
    display:flex;
    flex-direction:column;
    gap:10px;
}

input{
    padding:12px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#5563d6;
}

.total{
    margin:20px 0;
    text-align:center;
    font-size:24px;
    font-weight:bold;
    color:#333;
}

ul{
    list-style:none;
}

li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px;
    margin-bottom:10px;
    background:#f5f5f5;
    border-radius:10px;
}

.delete-btn{
    background:#ff4d4d;
    padding:6px 10px;
    font-size:14px;
}

.delete-btn:hover{
    background:#e63939;
}
</style>
</head>

<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <div class="input-group">
        <input type="text" id="expenseName" placeholder="Expense Name">
        <input type="number" id="expenseAmount" placeholder="Amount">
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="total">
        Total: ₹<span id="total">0</span>
    </div>

    <ul id="expenseList"></ul>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

renderExpenses();

function addExpense(){

    const name =
    document.getElementById("expenseName").value;

    const amount =
    Number(document.getElementById("expenseAmount").value);

    if(name === "" || amount <= 0){
        alert("Please enter valid details");
        return;
    }

    expenses.push({
        name,
        amount
    });

    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );

    renderExpenses();

    document.getElementById("expenseName").value="";
    document.getElementById("expenseAmount").value="";
}

function renderExpenses(){

    const list =
    document.getElementById("expenseList");

    list.innerHTML="";

    let total = 0;

    expenses.forEach((expense,index)=>{

        total += expense.amount;

        const li =
        document.createElement("li");

        li.innerHTML = `
            <span>
                ${expense.name} - ₹${expense.amount}
            </span>

            <button
            class="delete-btn"
            onclick="deleteExpense(${index})">
            ❌
            </button>
        `;

        list.appendChild(li);
    });

    document.getElementById("total").textContent = total;
}

function deleteExpense(index){

    expenses.splice(index,1);

    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );

    renderExpenses();
}

</script>

</body>
</html>
